# Netlify configuration — Woerden360 (Next.js 14)

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# `timeout` is NOT valid directly under [functions]; it must be per-function.
# The Next.js runtime serves every route (incl. /api/scenario) through a single
# bundled function named "__netlify-handler" — NOT "api/scenario" — so a block
# keyed to the route path would match nothing. The wildcard reliably applies the
# 26s max timeout to that handler. (Requires a plan that allows >10s; Starter/
# Free are capped at 10s regardless — use a faster ANTHROPIC_MODEL there.)
[functions."*"]
  timeout = 26
